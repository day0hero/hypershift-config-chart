---
name: Super linter

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    uses: validatedpatterns/github-actions-library/.github/workflows/superlinter.yml@d9133c81202d05800b90e14bc544113aca4b1906 # v1
    with:
      sl_env: |
        VALIDATE_BIOME_FORMAT=false
        FILTER_REGEX_EXCLUDE=.*templates/.*\.ya?ml
